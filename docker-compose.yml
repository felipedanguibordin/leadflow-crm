services:
  postgres:
    image: postgres:16-alpine
    container_name: leadflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow
      POSTGRES_DB: leadflow
    ports:
      - '5432:5432'
    volumes:
      - leadflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leadflow -d leadflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leadflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - leadflow_redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: leadflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - leadflow_minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  leadflow_pg_data:
  leadflow_redis_data:
  leadflow_minio_data:
