<mat-toolbar color="primary" class="toolbar">
  <mat-icon aria-hidden="true">hub</mat-icon>
  <span class="toolbar__brand">{{ title() }}</span>
  <a
    mat-button
    routerLink="/"
    routerLinkActive="mat-mdc-button-active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    Home
  </a>
  <a mat-button routerLink="/dashboard" routerLinkActive="mat-mdc-button-active">Dashboard</a>
  <span class="toolbar__spacer"></span>
  <a mat-button href="/api/docs" target="_blank" rel="noopener">API docs</a>
  <span class="toolbar__chip" [attr.data-state]="apiStatus()">
    @switch (apiStatus()) {
      @case ('ok') {
        <span>API online</span>
      }
      @case ('error') {
        <span>API offline</span>
      }
      @default {
        <span>Checking API…</span>
      }
    }
  </span>
</mat-toolbar>

<main class="shell">
  <router-outlet />
</main>
